name: Production Health Check

# Pings every top-nav landing page on touchlesscarwashfinder.com every 15 min.
# If any page returns non-200 OR an empty body OR a stuck 304-without-body
# (the Netlify Durable Cache poisoning class of bug we hit on /best and
# /blog April 30 2026), the workflow:
#
#   1. Calls /api/revalidate to purge that URL from the Netlify CDN
#   2. Waits 10s + re-checks
#   3. If still broken, fails loudly so GitHub emails the repo owner
#
# That means cache poisoning auto-recovers within ~15 minutes of happening,
# and the repo owner is paged only if recovery actually fails.

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}  # also allow manual run from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe production pages
        env:
          # Netlify build hook (a redeploy is the ONLY thing that reliably
          # clears the stuck-304 ISR/durable-cache poisoning — a CDN purge
          # can't, because the Next.js function layer itself keeps serving the
          # bare 304). Set in repo Settings > Secrets > Actions.
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          set -eu

          BASE="https://touchlesscarwashfinder.com"
          # Top-nav targets + a few critical sub-routes. A page is "broken"
          # if it returns non-2xx OR has a body smaller than 1 KB (top-nav
          # pages are always at least ~50 KB; anything tiny is a 304-without
          # -body or an error stub).
          PATHS=(
            "/"
            "/best"
            "/blog"
            "/chains"
            "/states"
            "/features"
            "/equipment"
            "/about"
          )

          BROKEN=()

          for path in "${PATHS[@]}"; do
            url="${BASE}${path}"
            # Cache-busting query so we hit the CDN as a fresh client would,
            # not a re-validation chain.
            full="${url}?_health=$(date +%s%N)"
            tmp=$(mktemp)
            code=$(curl --max-time 30 -sL -A "Mozilla/5.0 (HealthCheck)" \
              -H "Cache-Control: no-cache" \
              -o "$tmp" -w "%{http_code}" "$full" || echo "000")
            size=$(wc -c < "$tmp" | tr -d ' ')
            rm -f "$tmp"

            if [ "$code" != "200" ] || [ "$size" -lt 1024 ]; then
              echo "::warning::BROKEN $path -> code=$code size=$size"
              BROKEN+=("$path")
            else
              echo "OK $path -> code=$code size=$size"
            fi
          done

          if [ "${#BROKEN[@]}" -eq 0 ]; then
            echo "All pages healthy."
            exit 0
          fi

          echo ""
          echo "Attempting auto-recovery via /api/revalidate..."
          for path in "${BROKEN[@]}"; do
            echo "Purging $path..."
            curl --max-time 30 -s -X POST "${BASE}/api/revalidate" \
              -H "Content-Type: application/json" \
              -d "{\"path\":\"$path\"}" || true
            echo ""
          done

          echo ""
          echo "Waiting 15s for cache to settle..."
          sleep 15

          echo ""
          echo "Re-checking..."
          STILL_BROKEN=()
          for path in "${BROKEN[@]}"; do
            url="${BASE}${path}?_recheck=$(date +%s%N)"
            tmp=$(mktemp)
            code=$(curl --max-time 30 -sL -A "Mozilla/5.0 (HealthCheck)" \
              -H "Cache-Control: no-cache" \
              -o "$tmp" -w "%{http_code}" "$url" || echo "000")
            size=$(wc -c < "$tmp" | tr -d ' ')
            rm -f "$tmp"

            if [ "$code" != "200" ] || [ "$size" -lt 1024 ]; then
              echo "::error::STILL BROKEN after purge: $path -> code=$code size=$size"
              STILL_BROKEN+=("$path")
            else
              echo "RECOVERED $path -> code=$code size=$size"
            fi
          done

          if [ "${#STILL_BROKEN[@]}" -eq 0 ]; then
            echo ""
            echo "All previously broken pages auto-recovered via CDN purge."
            exit 0
          fi

          # CDN purge did not clear it. This is the stuck-304 class of bug
          # where the Next.js ISR layer itself serves a bare 304 (cache-status
          # shows `"Next.js"; hit ... fwd-status=304`). A purge can't fix that —
          # only a fresh deploy rebuilds the page with a clean ETag. So trigger
          # a redeploy via the Netlify build hook, wait for it to ship, recheck.
          echo ""
          echo "::warning::CDN purge did not recover: ${STILL_BROKEN[*]}"

          if [ -z "${NETLIFY_BUILD_HOOK_URL:-}" ]; then
            echo "::error::No NETLIFY_BUILD_HOOK_URL secret set — cannot auto-redeploy."
            echo "::error::Still broken after purge: ${STILL_BROKEN[*]}"
            exit 1
          fi

          echo "Triggering Netlify redeploy (the reliable fix for stuck 304s)..."
          curl --max-time 30 -s -X POST -d {} "$NETLIFY_BUILD_HOOK_URL" || true

          echo ""
          echo "Waiting up to 5 min for the redeploy to go live..."
          RECOVERED=0
          for attempt in $(seq 1 15); do
            sleep 20
            REMAIN=()
            for path in "${STILL_BROKEN[@]}"; do
              url="${BASE}${path}?_redeploy=$(date +%s%N)"
              tmp=$(mktemp)
              code=$(curl --max-time 30 -sL -A "Mozilla/5.0 (HealthCheck)" \
                -H "Cache-Control: no-cache" \
                -o "$tmp" -w "%{http_code}" "$url" || echo "000")
              size=$(wc -c < "$tmp" | tr -d ' ')
              rm -f "$tmp"
              if [ "$code" != "200" ] || [ "$size" -lt 1024 ]; then
                REMAIN+=("$path")
              fi
            done
            if [ "${#REMAIN[@]}" -eq 0 ]; then
              echo "All pages healthy after redeploy (attempt $attempt)."
              RECOVERED=1
              break
            fi
            echo "  still waiting on: ${REMAIN[*]} (attempt $attempt/15)"
          done

          if [ "$RECOVERED" -ne 1 ]; then
            echo ""
            echo "::error::Auto-recovery FAILED even after redeploy: ${REMAIN[*]}"
            echo "Manual investigation needed. The workflow failure email"
            echo "GitHub sends to the repo owner is the alert."
            exit 1
          fi

          echo ""
          echo "All previously broken pages auto-recovered via redeploy."
