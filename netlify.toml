[build]
command = "npx next build"
publish = ".next"

[build.environment]
# Google Maps JS API key is intentionally client-side (restricted by HTTP referrer).
# Netlify's smart secret scanner flags it in the build output — false positive.
SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[plugins]]
package = "@netlify/plugin-nextjs"

# Listing detail pages: short edge-cache so admin edits become visible quickly.
# s-maxage is intentionally 60s (not 3600s): purgeCache() does NOT reliably clear
# Netlify's durable cache here, so edits were invisible for up to an hour. A 60s
# freshness window makes edits self-heal within ~1 min, while stale-while-revalidate
# keeps TTFB fast (always a cached body to serve while the edge revalidates).
[[headers]]
  for = "/state/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=60, stale-while-revalidate=86400"

# Top-nav landing pages: same SWR pattern as /state/* to prevent the ETag-
# based 304 cache poisoning we hit on /best and /blog (April 30 2026).
# Without an explicit Netlify-CDN-Cache-Control header, these pages fall
# back to Next.js's default ETag caching, where the Netlify Durable Cache
# can wind up storing a 304 response without a body — clicks then silently
# fail in the browser. Pinning a 5-minute s-maxage with SWR means Netlify
# always has a fresh body cached and never has to forward 304s without
# content. purgeCache() in /api/revalidate clears these on demand.
[[headers]]
  for = "/best/chains"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=1800, stale-while-revalidate=86400, durable"

[[headers]]
  for = "/best/chains/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=1800, stale-while-revalidate=86400, durable"

[[headers]]
