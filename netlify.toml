# ads.txt → Monumetric-hosted file (hybrid/custom-site install). Monumetric
# maintains this file on their end; the 301 keeps our ads.txt always current
# without manual edits. force=true so it wins even if a static /ads.txt returns.
# Method per Monumetric's own guidance (301 recommended).
[[redirects]]
  from = "/ads.txt"
  to = "https://monu.delivery/adstxt/3/e/b2b8b0-9b01-4c4f-bca0-6a5b305299a6.txt"
  status = 301
  force = true

# Old listing slug that was incorrectly matching a Florida listing — send to Austin city page
[[redirects]]
  from = "/state/texas/austin/laser-carwash"
  to = "/state/texas/austin"
  status = 301

# Blog slug redirects (old generic posts rewritten for touchless focus)
[[redirects]]
  from = "/blog/top-5-benefits-of-regular-car-washing"
  to = "/blog/benefits-of-touchless-car-washes"
  status = 301

# Deleted duplicate blog posts → redirect to surviving articles
[[redirects]]
  from = "/blog/touchless-vs-automatic-car-wash"
  to = "/blog/touchless-vs-brush-car-wash"
  status = 301

[[redirects]]
  from = "/blog/why-touchless-car-washes-are-better"
  to = "/blog/benefits-of-touchless-car-washes"
  status = 301
