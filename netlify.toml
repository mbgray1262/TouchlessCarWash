[build]
command = "npx next build"
publish = ".next"

[build.environment]
# Google Maps JS API key is intentionally client-side (restricted by HTTP referrer).
# Netlify's smart secret scanner flags it in the build output — false positive.
SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[plugins]]
package = "@netlify/plugin-nextjs"

# Blog slug redirects (old generic posts rewritten for touchless focus)
[[redirects]]
  from = "/blog/top-5-benefits-of-regular-car-washing"
  to = "/blog/benefits-of-touchless-car-washes"
  status = 301

# Deleted duplicate blog posts → redirect to surviving articles
[[redirects]]
  from = "/blog/touchless-vs-automatic-car-wash"
  to = "/blog/touchless-vs-brush-car-wash"
  status = 301

[[redirects]]
  from = "/blog/why-touchless-car-washes-are-better"
  to = "/blog/benefits-of-touchless-car-washes"
  status = 301
